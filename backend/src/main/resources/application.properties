spring.application.name=jobswipe-backend
server.port=8080

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/jobswipe}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

app.jwt.secret=${JWT_SECRET:jobswipe-development-secret-that-is-long-enough-for-hmac-signing}
app.jwt.expiration-ms=604800000
app.upload-dir=${UPLOAD_DIR:uploads}
app.frontend-url=${FRONTEND_URL:http://localhost:3000}
app.dev-mode=${APP_DEV_MODE:true}
