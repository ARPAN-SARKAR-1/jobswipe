# Development fallback profile for machines that do not have PostgreSQL running.
# Start with: SPRING_PROFILES_ACTIVE=dev-fallback mvn spring-boot:run
# This is not intended for production or final database verification.

spring.datasource.url=jdbc:h2:file:./data/jobswipe-dev;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
