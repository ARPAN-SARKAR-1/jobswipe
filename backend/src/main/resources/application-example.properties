# Copy values from this file into environment variables or backend/.env.
# Do not commit real passwords, Supabase passwords, Neon passwords, or production JWT secrets.

# Local PostgreSQL:
DATABASE_URL=jdbc:postgresql://localhost:5432/jobswipe
DATABASE_USERNAME=postgres
DATABASE_PASSWORD=postgres

# Supabase pooler example:
# DATABASE_URL=jdbc:postgresql://aws-0-your-region.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
# DATABASE_USERNAME=postgres.your-project-ref
# DATABASE_PASSWORD=replace_with_supabase_database_password

# Neon example:
# DATABASE_URL=jdbc:postgresql://ep-your-project.your-region.aws.neon.tech/neondb?sslmode=require
# DATABASE_USERNAME=neondb_owner
# DATABASE_PASSWORD=replace_with_neon_database_password

JWT_SECRET=replace_with_a_very_long_random_secret_for_hmac_signing_at_least_32_chars
UPLOAD_DIR=uploads
FRONTEND_URL=http://localhost:3000
APP_DEV_MODE=true

# Optional fallback profile for local UI demos without PostgreSQL:
# SPRING_PROFILES_ACTIVE=dev-fallback
